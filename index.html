<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPG - סוכנות לאוטומציה ותשתיות טכנולוגיות</title>
    <style>
        /* איפוס הגדרות ברירת מחדל */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* עיצוב גוף האתר - רקע כהה */
        body {
            background-color: #0d1117; /* צבע שחור-פחם יוקרתי */
            color: #ffffff; /* טקסט לבן */
            line-height: 1.6;
        }

        /* עיצוב אזור הגיבור - המסך הראשון */
        .hero {
            min-height: 100vh; /* תופס את כל גובה המסך */
            display: flex;
            flex-direction: column;
            justify-content: center; /* ממרכז את התוכן */
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, #161b22 0%, #0d1117 100%); /* אפקט תאורה עדין ברקע */
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            font-weight: 800;
        }

        /* הדגשה בצבע ירוק-ניאון לכותרת */
        .hero h1 span {
            color: #00ff88; 
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 800px;
            margin-bottom: 40px;
            color: #8b949e; /* טקסט אפור בהיר לתת-כותרת */
        }

        /* עיצוב כפתור ההנעה לפעולה */
        .cta-button {
            background-color: #00ff88;
            color: #0d1117;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* אפקט מעבר עכבר על הכפתור */
        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
        }

        /* התאמה למסכי טלפון (מובייל) */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>מכניסים את העסק שלך <span>לאוטומט</span></h1>
        <p>בניית תשתיות טכנולוגיות ומערכות אוטומציה מורכבות לעסקים. הפתרון השלם לייעול תהליכים, חיסכון בשעות אדם ושליטה מלאה על האופרציה שלכם.</p>
        <a href="#contact" class="cta-button">לשיחת ייעוץ טכנולוגי</a>
    </section>
    </body>
</html>
